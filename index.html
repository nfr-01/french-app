const lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch { return d; } };
const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const saveEx = (sId, key, data) => lsSet(`pj2_ex_${sId}_${key}`, data);
const loadEx = (sId, key) => lsGet(`pj2_ex_${sId}_${key}`, null);

// ==================== VOICE HELPER ====================
const getVoice = (preferCA = false) => {
  const voices = window.speechSynthesis.getVoices();
  const frVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("fr"));
  if (preferCA) {
    const caVoice = frVoices.find(v => v.lang.toLowerCase().includes("ca"));
    if (caVoice) return caVoice;
  }
  const MALE = ["thomas","henri","nicolas","pierre","luca","marco","diego"];
  const FEMALE = ["amelie","amelia","marie","alice","julie","sophie","claire","aurelie","chantal"];
  const maleVoice = frVoices.find(v => MALE.some(n => v.name.toLowerCase().includes(n)));
  const nonFem = frVoices.find(v => !FEMALE.some(n => v.name.toLowerCase().includes(n)));
  return maleVoice || nonFem || frVoices[0] || null;
};

const speak = (text, preferCA = false) => {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = preferCA ? "fr-CA" : "fr-FR";
  utter.rate = 0.88;
  const doSpeak = () => {
    const voice = getVoice(preferCA);
    if (voice) utter.voice = voice;
    window.speechSynthesis.speak(utter);
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { doSpeak(); }
  else { window.speechSynthesis.addEventListener("voiceschanged", doSpeak, { once: true }); setTimeout(doSpeak, 400); }
};

// ==================== PROGRESS HELPERS ====================
const getSectionProgress = (section) => {
  const exs = section.writingExercises;
  let done = 0, totalPct = 0, scored = 0;
  exs.forEach((ex, i) => {
    const saved = loadEx(section.id, `ex${i}`);
    if (!saved?.submitted) return;
    done++;
    if (ex.type === "fill") {
      const inp = saved.inputs || [];
      const correct = ex.sentences.filter((s, j) => (inp[j] || "").toLowerCase().trim() === s.answer.toLowerCase().trim()).length;
      totalPct += Math.round((correct / ex.sentences.length) * 100);
      scored++;
    } else if (ex.type === "match") {
      const sel = saved.selections || {};
      const correct = ex.pairs.filter((p, j) => sel[j] === p.pt).length;
      totalPct += Math.round((correct / ex.pairs.length) * 100);
      scored++;
    }
  });
  return { total: exs.length, done, avgScore: scored > 0 ? Math.round(totalPct / scored) : null };
};

// ==================== SRS (SPACED REPETITION) ====================
const SRS_INTERVALS = [0, 1, 3, 7, 14, 30]; // days per level (0=due now, 5=mastered)
const srsKey = (sId, wIdx) => `pj2_srs_${sId}_${wIdx}`;
const srsGet  = (sId, wIdx) => lsGet(srsKey(sId, wIdx), { level: 0, nextReview: 0 });
const srsUpdate = (sId, wIdx, knew) => {
  const cur = srsGet(sId, wIdx);
  const newLevel = knew ? Math.min(cur.level + 1, 5) : Math.max(cur.level - 1, 0);
  const days = SRS_INTERVALS[newLevel];
  lsSet(srsKey(sId, wIdx), { level: newLevel, nextReview: Date.now() + days * 86400000 });
};
const srsDueWords = () => {
  const now = Date.now();
  const due = [];
  SECTIONS_DATA.forEach(s => {
    s.vocabulary.forEach((w, i) => {
      const d = srsGet(s.id, i);
      if (d.level < 5 && d.nextReview <= now) due.push({ word: w, sId: s.id, wIdx: i, level: d.level });
    });
  });
  return due;
};

// ==================== QUIZ BUILDER ====================
const buildQuizQuestions = (studiedSectionIds, count = 10) => {
  const studied = SECTIONS_DATA.filter(s => studiedSectionIds.includes(s.id));
  if (studied.length === 0) return [];
  const pool = [];

  // All meanings from studied sections for cross-section distractors
  const allMeanings = studied.flatMap(s => s.vocabulary.map(w => w.meaning));

  studied.forEach(s => {
    // Vocabulary FR → PT with cross-section distractors
    s.vocabulary.forEach((w) => {
      const distractors = allMeanings.filter(m => m !== w.meaning);
      if (distractors.length < 3) return;
      const shuffled = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [...shuffled, w.meaning].sort(() => Math.random() - 0.5);
      pool.push({ type: "vocab", q: `O que significa "${w.word}"?`, opts, ans: w.meaning, speak: w.word, section: s.title, level: s.level });
    });
    // Vocabulary PT → FR (reverse)
    s.vocabulary.forEach((w) => {
      const distractors = s.vocabulary.filter(x => x.word !== w.word).map(x => x.word);
      if (distractors.length < 3) return;
      const shuffled = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [...shuffled, w.word].sort(() => Math.random() - 0.5);
      pool.push({ type: "vocab", q: `Como se diz "${w.meaning}" em francês?`, opts, ans: w.word, section: s.title, level: s.level });
    });
    // Listening comprehension — include the text as context
    if (s.listeningText?.questions) {
      const ctx = s.listeningText.fr;
      s.listeningText.questions.forEach(q => {
        pool.push({ type: "listening", q: q.q, opts: q.opts, ans: q.opts[q.ans], context: ctx, section: s.title, level: s.level });
      });
    }
    // Interpret exercises — include the passage text as context
    s.writingExercises.filter(ex => ex.type === "interpret").forEach(ex => {
      ex.questions.forEach(q => {
        pool.push({ type: "interpret", q: q.q, opts: q.opts, ans: q.opts[q.ans], context: ex.text, section: s.title, level: s.level });
      });
    });
  });

  return pool.sort(() => Math.random() - 0.5).slice(0, count);
};

const PronunciationTab = ({ section, sId }) => {
  const [recState, setRecState] = React.useState("idle");
  const [audioURL, setAudioURL] = React.useState(null);
  const [scores, setScores] = React.useState(() => lsGet(`pj2_pron_scores_${sId}`, {}));
  const mrRef = React.useRef(null);
  const chunksRef = React.useRef([]);
  const pron = section.pronunciation;

  // Load saved recording on mount
  React.useEffect(() => {
    const saved = lsGet(`pj2_audio_${sId}`, null);
    if (saved) { setAudioURL(saved); setRecState("done"); }
  }, [sId]);

  // Persist scores
  React.useEffect(() => {
    if (Object.keys(scores).length > 0) lsSet(`pj2_pron_scores_${sId}`, scores);
  }, [scores, sId]);

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunksRef.current = [];
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: "audio/webm" });
        const blobURL = URL.createObjectURL(blob);
        setAudioURL(blobURL);
        setRecState("done");
        stream.getTracks().forEach(t => t.stop());
        // Save as base64 to localStorage
        const reader = new FileReader();
        reader.onload = () => {
          try { lsSet(`pj2_audio_${sId}`, reader.result); } catch(e) {}
        };
        reader.readAsDataURL(blob);
      };
      mrRef.current = mr;
      mr.start();
      setRecState("recording");
    } catch (e) { alert("Permissão de microfone negada. Verifique as configurações do navegador."); }
  };

  const stopRec = () => { if (mrRef.current) mrRef.current.stop(); };

  const downloadAudio = () => {
    if (!audioURL) return;
    const a = document.createElement("a");

  const allScored = Object.keys(scores).length === 4;

    const weakest = Object.entries(scores).sort((a, b) => a[1] - b[1])[0];

    if (avg >= 4.5) return {

      color: "var(--green)", emoji: "👍"
    };
    if (avg >= 2.5) return {
      msg: `Bonne progression ! Você está no caminho certo. Foque em melhorar ${weakName}. Dicas específicas: ${tips.slice(0, 2).join(" — ")}. Grave-se todos os dias por 5 minutos para progredir rapidamente.`,
      color: "var(--accent)", emoji: "💪"
    };
    return {
      msg: `Continuez à pratiquer ! O francês tem sons muito diferentes do português — é normal levar tempo. Desafios principais: ${tips.slice(0, 2).join(" / ")}. Técnica: ouça o modelo em velocidade lenta, depois repita sílaba por sílaba.`,
      color: "var(--orange)", emoji: "🎯"

    React.createElement("div", { className: "card-lg", style: { padding: "20px 22px", marginBottom: 16 } },
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
        React.createElement("h3", { style: { fontSize: 16, fontWeight: 600 } }, "Texto para pronunciar"),
        React.createElement("button", { className: "btn btn-sm btn-secondary", onClick: () => speak(pron.text) }, "🔊 Ouvir modelo")
      ),
      React.createElement("p", { style: { fontSize: 15, lineHeight: 1.85, marginBottom: 16, padding: "12px 14px", background: "var(--surface2)", borderRadius: 8, borderLeft: "3px solid var(--accent)" } }, pron.text),
      React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" } },
        recState === "idle" && React.createElement("button", { className: "btn btn-sm btn-primary", onClick: startRec }, "🎙️ Gravar minha voz"),
        recState === "recording" && React.createElement("button", { className: "btn btn-sm btn-danger", onClick: stopRec }, "⏹ Parar gravação"),

const QUIZ_TYPE_LABELS = { vocab: "📚 Vocabulário", listening: "🎧 Compreensão", interpret: "📖 Interpretação" };

const QuizMode = ({ completedSections, onClose, onNewQuiz, dark }) => {
  const [questions] = React.useState(() => buildQuizQuestions(completedSections));
  const [qIdx, setQIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [done, setDone] = React.useState(false);
  const [showCtx, setShowCtx] = React.useState(false);

  if (questions.length === 0) return React.createElement("div", { className: "fade-in", style: { maxWidth: 620, margin: "0 auto", padding: "40px 20px", textAlign: "center" } },
    React.createElement("div", { style: { fontSize: 40, marginBottom: 16 } }, "📚"),
    React.createElement("h2", { style: { fontSize: 20, fontWeight: 700, marginBottom: 10 } }, "Nenhuma seção estudada ainda"),
    React.createElement("p", { style: { color: "var(--text2)", marginBottom: 20 } }, "Complete pelo menos uma seção para desbloquear o Quiz Rápido."),
    React.createElement("button", { className: "btn btn-primary", onClick: onClose }, "← Voltar ao Dashboard")
  );

  const score = results.filter(Boolean).length;
  const q = questions[qIdx];
  const pct = Math.round((qIdx / questions.length) * 100);

  const handleSelect = (opt) => { if (!confirmed) setSelected(opt); };

  const handleConfirm = () => {
    if (selected === null) return;
    const correct = selected === q.ans;
    setResults(prev => [...prev, correct]);
    setConfirmed(true);
    setTimeout(() => {
      if (qIdx + 1 >= questions.length) {
        setDone(true);
      } else {
        setQIdx(i => i + 1);
        setSelected(null);
        setConfirmed(false);
        setShowCtx(false);
      }
    }, 900);
  };

  const handleKeyDown = (e) => { if (e.key === "Enter" && selected !== null && !confirmed) handleConfirm(); };

  const getRating = (s, t) => {
    const p = s / t;
    if (p === 1) return { emoji: "🏆", label: "Perfeito!", color: "var(--green)" };
    if (p >= 0.8) return { emoji: "🌟", label: "Excelente!", color: "var(--green)" };
    if (p >= 0.6) return { emoji: "👍", label: "Bom trabalho!", color: "var(--accent)" };
    if (p >= 0.4) return { emoji: "📖", label: "Continue praticando!", color: "var(--orange)" };
    return { emoji: "💪", label: "Hora de revisar mais!", color: "var(--orange)" };
  };

    const rating = getRating(score, questions.length);
    return React.createElement("div", { className: "fade-in", style: { maxWidth: 560, margin: "0 auto", padding: "32px 20px" } },

        React.createElement("div", { style: { fontSize: 48, fontWeight: 800, color: rating.color, marginBottom: 4 } }, `${score}/${questions.length}`),
        React.createElement("p", { style: { color: "var(--text2)", fontSize: 14, marginBottom: 24 } }, `${Math.round((score / questions.length) * 100)}% de acerto`),
        // Per-question result summary
        React.createElement("div", { style: { display: "flex", gap: 6, justifyContent: "center", marginBottom: 24, flexWrap: "wrap" } },
          questions.map((_, i) => React.createElement("div", {
            key: i,
            style: { width: 32, height: 32, borderRadius: "50%", background: results[i] ? "var(--green)" : "var(--red)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: "white", fontWeight: 700 }
          }, results[i] ? "✓" : "✗"))
        ),
        React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "center" } },
          React.createElement("button", { className: "btn btn-primary", onClick: onNewQuiz }, "↺ Novo quiz"),
          React.createElement("button", { className: "btn btn-secondary", onClick: onClose }, "← Dashboard")
        )
      )
    );
  }

  return React.createElement("div", { className: "fade-in", style: { maxWidth: 620, margin: "0 auto", padding: "24px 16px" }, onKeyDown: handleKeyDown, tabIndex: -1 },
    // Header
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 } },
      React.createElement("button", { className: "btn btn-sm btn-secondary", onClick: onClose }, "✕ Sair"),
      React.createElement("span", { style: { fontSize: 13, color: "var(--text2)" } }, `Questão ${qIdx + 1} de ${questions.length}`),
      React.createElement("span", { style: { fontSize: 13, fontWeight: 600, color: "var(--green)" } }, `${results.filter(Boolean).length} corretas`)
    ),
    // Progress bar
    React.createElement("div", { style: { height: 6, background: "var(--surface3)", borderRadius: 100, marginBottom: 20, overflow: "hidden" } },
      React.createElement("div", { style: { height: "100%", width: `${pct}%`, background: "var(--accent)", borderRadius: 100, transition: "width .4s" } })
    ),
    // Context block (listening / interpret)
    q.context && React.createElement("div", { className: "card", style: { marginBottom: 10, overflow: "hidden" } },
      React.createElement("button", {
        onClick: () => setShowCtx(v => !v),
        style: { width: "100%", padding: "10px 16px", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: "var(--font)", color: "var(--text2)", fontSize: 13 }
      },
        React.createElement("span", null, q.type === "listening" ? "🎧 Ver texto de compreensão" : "📖 Ver passagem"),
        React.createElement("span", null, showCtx ? "▲" : "▼")
      ),
      showCtx && React.createElement("div", { style: { padding: "0 16px 14px", fontSize: 13, color: "var(--text)", lineHeight: 1.6, borderTop: "1px solid var(--border)", paddingTop: 10, whiteSpace: "pre-line" } },
        React.createElement(SpeakBtn, { text: q.context, size: 13 }), " ", q.context
      )
    ),
    // Question card
    React.createElement("div", { className: "card", style: { padding: "22px 24px", marginBottom: 14 } },
      React.createElement("div", { style: { fontSize: 11, fontWeight: 600, color: "var(--text3)", marginBottom: 10, textTransform: "uppercase", letterSpacing: .5 } },
        QUIZ_TYPE_LABELS[q.type] || "❓", " · ", q.section
      ),
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 6 } },
        React.createElement("p", { style: { fontSize: 16, fontWeight: 600, flex: 1 } }, q.q),
        q.speak && React.createElement(SpeakBtn, { text: q.speak, size: 16 })
      )
    ),
    // Options
    React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 } },
      q.opts.map((opt, oi) => {
        let bg = "var(--surface)", border = "var(--border)", color = "var(--text)";
        if (selected === opt && !confirmed) { bg = "var(--accent-l)"; border = "var(--accent)"; }
        if (confirmed && opt === q.ans) { bg = "var(--green-l)"; border = "var(--green)"; color = "var(--green)"; }
        if (confirmed && selected === opt && opt !== q.ans) { bg = "var(--red-l)"; border = "var(--red)"; color = "var(--red)"; }
        return React.createElement("button", {
          key: oi, onClick: () => handleSelect(opt),
          style: { padding: "12px 16px", borderRadius: 10, border: `1.5px solid ${border}`, background: bg, color, fontFamily: "var(--font)", fontSize: 14, textAlign: "left", cursor: confirmed ? "default" : "pointer", fontWeight: selected === opt ? 600 : 400, transition: "all .15s" }
        },
          React.createElement("span", { style: { fontSize: 12, color: "var(--text3)", marginRight: 8 } }, `${["A","B","C","D"][oi]}.`), opt,
          confirmed && opt === q.ans && React.createElement("span", { style: { float: "right" } }, "✅"),
          confirmed && selected === opt && opt !== q.ans && React.createElement("span", { style: { float: "right" } }, "❌")
        );
      })
    ),
    !confirmed && React.createElement("button", {
      className: "btn btn-primary", style: { width: "100%", padding: 12, fontSize: 15 },
      disabled: selected === null, onClick: handleConfirm
    }, "Confirmar resposta")
  );
};

  // --- Pronomes ---
  { kw: ["pronome","sujeito","je","tu","il","elle","nous","vous","ils","elles","on"], r: "Os pronomes pessoais sujeito são: je (eu), tu (você/informal), il (ele), elle (ela), nous (nós), vous (vocês/formal), ils (eles), elles (elas). Importante: 'on' é muito usado no francês falado com o sentido de 'nós': On mange ensemble? (Vamos comer juntos?). No Québec, 'on' é ainda mais frequente que 'nous'!" },
  { kw: ["vous","tu","formal","informal","tratamento","tutoyer","vouvoyer"], r: "A distinção tu/vous é muito importante culturalmente! 'Tu' é usado com amigos, familiares e crianças — é o tutoiement. 'Vous' é usado com desconhecidos, superiores, em situações formais — é o vouvoiement. No Québec, o tutoiement é muito mais comum e o vous formal pode soar distante até no trabalho. Na França, em geral é mais formal." },
  { kw: ["pronome objeto","me","te","le","lui","y","en","objeto direto","objeto indireto","cod","coi"], r: "Os pronomes objeto direto são: me, te, le/la, nous, vous, les. Os indiretos: me, te, lui, nous, vous, leur. Eles ficam ANTES do verbo: Je le vois (Eu o vejo). Tu lui parles (Você fala com ele). O 'y' substitui um lugar ou complemento com 'à': J'y vais (Vou lá). O 'en' substitui 'de + coisa': J'en veux (Quero disso)." },

  // --- Negação ---
  { kw: ["negação","negacao","ne pas","não","nao","jamais","rien","personne","plus"], r: "A negação básica em francês usa ne...pas ao redor do verbo: Je ne parle pas. Atenção: no francês falado, o 'ne' é frequentemente omitido: Je parle pas (informal). Há outras negações: ne...jamais (nunca), ne...rien (nada), ne...personne (ninguém), ne...plus (não mais). No Québec informal, o 'ne' quase desaparece completamente!" },

  // --- Adjetivos ---
  { kw: ["adjetivo","acordo","concordância","concordancia","féminin","feminino","masculino adjetivo","grand","petit","beau"], r: "Os adjetivos em francês concordam em gênero e número com o substantivo. Em geral, adiciona-se um -e para o feminino: grand → grande, petit → petite. Para o plural, adiciona-se -s. Alguns adjetivos têm formas irregulares: beau/belle, nouveau/nouvelle, vieux/vieille. E em francês, a maioria dos adjetivos vem DEPOIS do substantivo: une voiture rouge, un homme intelligent." },
  { kw: ["adjetivo antes","beau","bon","grand","petit","jeune","vieux","nouveau","posição adjetivo","bangs"], r: "Alguns adjetivos especiais vêm ANTES do substantivo — o acrônimo BANGS ajuda a lembrar: Beauty (beau, joli), Age (jeune, vieux, nouveau), Number (premier, deuxième), Goodness (bon, mauvais), Size (grand, petit). Ex: une belle femme, un vieux château, une bonne idée. Os demais ficam após o substantivo." },

  // --- Présent ---
  { kw: ["presente","present","conjugar","conjugac","conjugacao","conjugacoes","verbos regulares","primeiro grupo","segundo grupo","terminacao"], r: "Os verbos regulares em -er seguem o padrão: -e, -es, -e, -ons, -ez, -ent. Ex: parler → je parle, tu parles, il parle, nous parlons, vous parlez, ils parlent. Os em -ir: finir → je finis, tu finis, il finit, nous finissons, vous finissez, ils finissent. Os em -re: vendre → je vends, tu vends, il vend, nous vendons, vous vendez, ils vendent." },
  { kw: ["verbo irregular","verbos irregulares","aller","venir","faire","prendre","savoir","pouvoir","vouloir","devoir","irregulares"], r: "Os verbos irregulares mais usados: aller (je vais, tu vas, il va, nous allons, vous allez, ils vont), faire (je fais, tu fais, il fait, nous faisons, vous faites, ils font), venir (je viens, tu viens, il vient, nous venons, vous venez, ils viennent), pouvoir (je peux, tu peux, il peut, nous pouvons, vous pouvez, ils peuvent). Valem muito a pena decorar!" },

  // --- Passé Composé ---
  { kw: ["passe compose","passado composto","passei","pretérito","preterito","passado","acao passada","participio","participe"], r: "O passé composé é formado por avoir ou être no présent + participe passé. Com avoir: J'ai mangé, tu as parlé. Com être: Je suis allé(e), elle est partie. Os verbos com être incluem os de movimento/estado: aller, venir, partir, arriver, naître, mourir, rester, tomber, e todos os reflexivos. Com être, o participe concorda com o sujeito!" },
  { kw: ["participe passé","particípio passado","participio passado","mangé","parlé","fini","pris","fait","été","eu"], r: "A formação do participe passé: verbos -er → é (mangé, parlé, aimé), verbos -ir → i (fini, parti, dormi), verbos -re → u (vendu, rendu). Irregulares comuns: faire → fait, être → été, avoir → eu, prendre → pris, voir → vu, pouvoir → pu, vouloir → voulu, savoir → su, mettre → mis, dire → dit." },
  { kw: ["avoir être passé composé","quando usar être","quando usar avoir","verbo com être"], r: "A regra dos verbos com être no passé composé! Use être com: 1) Verbos de deslocamento: aller, venir, partir, arriver, entrer, sortir, monter, descendre, rentrer, retourner, passer; 2) Verbos de estado: naître, mourir, rester, tomber, devenir; 3) TODOS os verbos pronominais/reflexivos: se lever, se coucher, se doucher. Com être, o participe concorda: Elle est partie. Ils sont arrivés." },

  // --- Imparfait ---
  { kw: ["imparfait","imparfeito","imperfeito","habito passado","descricao passado","estava","tinha","costumava","imperfeito passado"], r: "O imparfait descreve ações habituais, estados ou descrições no passado. Formação: raiz do nous no présent + terminações: -ais, -ais, -ait, -ions, -iez, -aient. Ex: nous parlons → je parlais (eu falava/costumava falar). Único irregular: être → j'étais, tu étais... Diferença chave: passé composé para eventos pontuais, imparfait para contexto/hábito. Quand j'étais enfant, je jouais au foot. (Quando eu era criança, jogava futebol — hábito)." },
  { kw: ["passé composé vs imparfait","pc vs imparfait","diferença passado","quando usar imparfait","quando usar passé"], r: "A distinção clássica! Passé composé = ação completa, pontual, que interrompeu algo. Imparfait = fundo, contexto, hábito, estado contínuo. Exemplo prático: Il pleuvait (imparfait — estado de fundo) quand je suis sorti (passé composé — ação pontual). Autre exemple: Chaque matin, je buvais du café (imparfait — hábito) mais hier, j'ai bu du thé (passé composé — evento específico)." },

  // --- Futur ---
  { kw: ["futur","futuro","futur simple","futur proche","aller infinitif","vou fazer","vou falar","demain"], r: "Existem dois futuros em francês. O futur proche (futuro imediato): aller + infinitif — Je vais manger (vou comer). O futur simple (futuro distante ou formal): adiciona terminações ao infinitivo: -ai, -as, -a, -ons, -ez, -ont. Je parlerai (falarei), tu finiras, il viendra. No cotidiano, o futur proche é muito mais usado. No Québec informal, às vezes até o présent substitui o futur!" },

  // --- Conditionnel ---
  { kw: ["conditionnel","condicional","gostaria","pourrait","voudrait","si j'avais","si clauses","se eu tivesse"], r: "O conditionnel présent é formado como o futur simple, mas com as terminações do imparfait: -ais, -ais, -ait, -ions, -iez, -aient. Je voudrais (eu gostaria), il pourrait (ele poderia), nous irions (nós iríamos). Usado para pedidos educados: Je voudrais un café, s'il vous plaît. E nas frases condicionais com si: Si j'avais de l'argent, je voyagerais. (Se eu tivesse dinheiro, viajaria.)" },

  // --- Subjonctif ---
  { kw: ["subjonctif","subjuntivo","subjonctif présent","que je","vouloir que","falloir","il faut que","doute","emotion"], r: "O subjonctif é usado após certes expressões de vontade, dúvida, emoção ou obrigação. Gatilhos comuns: il faut que (é preciso que), je veux que (quero que), je doute que (duvido que), je suis content(e) que (fico feliz que), bien que (embora). Formação: raiz do ils no présent + -e, -es, -e, -ions, -iez, -ent. Ex: il faut que tu fasses (é preciso que você faça). Irregulares: être → que je sois, avoir → que j'aie." },

  // --- Pronomes reflexivos ---
  { kw: ["reflexivo","pronominal","se lever","se coucher","se laver","se réveiller","me","me lavo","me acordo"], r: "Os verbos pronominais/reflexivos usam os pronomes: me (eu me), te (você se), se (ele/ela se), nous (nós nos), vous (vocês se), se (eles se). Ex: Je me lève à 7h (Levanto às 7h). Tu te laves les mains (Você lava as mãos). Atenção: no passé composé, esses verbos usam être e o participe concorda com o sujeito: Elle s'est levée tôt." },

  // --- Perguntas ---
  { kw: ["pergunta","interrogação","interrogacao","est-ce que","comment","quand","où","pourquoi","combien","question"], r: "Há três formas de fazer perguntas em francês. A mais formal: inversão do sujeito: Parlez-vous français? A neutra: est-ce que: Est-ce que vous parlez français? A mais informal (oral): só entonação: Vous parlez français? No cotidiano francês e especialmente no Québec, a forma com est-ce que ou só a entonação são as mais comuns. As palavras interrogativas: où (onde), quand (quando), comment (como), pourquoi (por quê), combien (quanto), qui (quem), que/quoi (que/o quê)." },

  // --- Preposições ---
  { kw: ["preposição","preposicao","em","para","de","avec","dans","sur","sous","entre","pour","par","chez"], r: "As preposições de lugar mais usadas: dans (dentro de), sur (sobre/em cima de), sous (sob/embaixo de), devant (na frente de), derrière (atrás de), entre (entre), chez (na casa de / no lugar de). Com países: en + países femininos (en France, en Italie), au + países masculinos (au Brésil, au Japon), aux + países plural (aux États-Unis). Com cidades: à (à Paris, à Rio)." },
  { kw: ["chez","na casa","em casa de","chez moi","chez toi"], r: "'Chez' é uma preposição bem específica do francês, sem equivalente direto em português. Significa 'na casa de', 'no estabelecimento de', ou 'na obra de': Chez moi (na minha casa), chez le médecin (no médico), chez Zola (na obra de Zola). Chez nous pode também significar 'no nosso país' ou 'na nossa cultura'. C'est une belle preposition française!" },

  // --- Números e tempo ---
  { kw: ["número","numero","contar","soixante","quatre-vingt","80","70","90","heure","hora","data","ano"], r: "Os números são únicos em francês! 70 = soixante-dix (60+10), 80 = quatre-vingts (4×20), 90 = quatre-vingt-dix (4×20+10). Na Suíça e Bélgica dizem septante (70), huitante (80), nonante (90) — mais lógico! No Québec, também se usa certaines formas mais diretas. As horas: Il est 14h → Il est quatorze heures ou deux heures de l'après-midi. Para datas: on est le 25 mars (estamos no dia 25 de março)." },

  // --- Vocabulário cotidiano ---
  { kw: ["família","famille","père","mère","frère","soeur","mari","femme","enfant","fils","fille"], r: "Vocabulário de família: père (pai), mère (mãe), frère (irmão), sœur (irmã), grand-père (avô), grand-mère (avó), mari (marido), femme (esposa/mulher), enfant (criança), fils (filho), fille (filha), oncle (tio), tante (tia), cousin/cousine (primo/prima), neveu/nièce (sobrinho/sobrinha). Curiosidade: 'femme' significa tanto 'mulher' quanto 'esposa' dependendo do contexto!" },
  { kw: ["comida","nourriture","comer","boire","beber","restaurant","pain","fromage","vin","repas"], r: "Vocabulário alimentar essencial: le pain (o pão), le fromage (o queijo), le vin (o vinho), l'eau (a água), le café (o café), le repas (a refeição), le petit-déjeuner (café da manhã), le déjeuner (almoço), le dîner (jantar). Verbos: manger (comer), boire (beber), commander (pedir/encomendar). No restaurante: Je voudrais… (eu gostaria de…), L'addition, s'il vous plaît (a conta, por favor)." },
  { kw: ["viagem","voyage","avion","train","hotel","hôtel","billet","passeport","partir","arriver"], r: "Para viagens: le billet (a passagem/o bilhete), l'aéroport (o aeroporto), la gare (a estação de trem), le vol (o voo), l'hôtel (o hotel), la chambre (o quarto), arriver (chegar), partir (partir/sair), réserver (reservar). Frases úteis: Où est…? (Onde é…?), Comment puis-je aller à…? (Como posso ir a…?), Je voudrais réserver une chambre (gostaria de reservar um quarto)." },
  { kw: ["trabalho","travail","bureau","emploi","entreprise","chefe","collègue","réunion","emploi"], r: "Vocabulário profissional: le travail/l'emploi (o trabalho), le bureau (o escritório), l'entreprise (a empresa), le/la collègue (o/a colega), le/la chef(fe) (o/a chefe), la réunion (a reunião), le projet (o projeto), les vacances (as férias). Expressões úteis: Je travaille chez… (Trabalho na empresa…), J'ai une réunion à 14h (Tenho uma reunião às 14h), Je suis en télétravail (Estou em home office)." },
  { kw: ["cor","couleur","rouge","bleu","vert","jaune","blanc","noir","rose","orange","gris"], r: "As cores em francês: rouge (vermelho), bleu (azul), vert (verde), jaune (amarelo), blanc (branco), noir (preto), rose (rosa), orange (laranja — invariável!), gris (cinza), violet (roxo), marron (marrom — invariável!). Lembrete: as cores são adjetivos e concordam em gênero e número, exceto orange e marron: une robe rouge, des fleurs bleues, des yeux marron (não: marrons)." },

  // --- Pronúncia ---
  { kw: ["pronúncia","pronuncia","som","nasal","nasalização","an","en","on","in","un","prononciation"], r: "As vogais nasais são um dos maiores desafios! Há 3 sons principais: [ɑ̃] como em 'an/en' (grand, enfant — como o 'ã' brasileiro, mas mais posterior), [ɔ̃] como em 'on' (bon, maison — como 'õ' mas mais nasal), [ɛ̃] como em 'in/ain/ein' (vin, pain, plein — como 'ẽ'). Exercício: repita grand, bon, vin até sentir a diferença. C'est la clé de l'accent français!" },
  { kw: ["r francês","r gutural","r garganta","pronuncuiar r","son r"], r: "Le R français est particulier! Não é o R vibrante do português — é um R gutural, produzido na parte de trás da garganta (entre a língua e a úvula). Pense em fazer um leve gargarejo suave. Palavras para praticar: rouge, rue, rire, croire, merci. No Québec, o R é às vezes mais vibrante (mais parecido com o português), o que é uma vantagem para brasileiros!" },
  { kw: ["liaison","ligação","enchaînement","fala","falar","pronúncia palavras","pronúncia rápida"], r: "La liaison est essentielle! Em francês, certas consoantes finais (normalmente mudas) são pronunciadas quando a palavra seguinte começa com vogal: les amis → [lez-ami], vous avez → [vuz-avé], ils ont → [ilz-ɔ̃]. A liaison é obrigatória com artigos e pronomes: les enfants, nous avons. E proibida em certos contextos: et, 'h aspiré'. Isso é o que dá o ritmo fluido ao francês!" },
  { kw: ["e mudo","e caduc","schwa","e final","não se pronuncia","pronúncia e"], r: "Le E caduc (ou schwa) é aquele 'e' que às vezes se pronuncia e às vezes desaparece! No final de palavras, geralmente é mudo: grande [grãd], petite [pətit]. No meio de palavras pode cair no francês falado: je ne sais pas → [chnepa]. No Québec, o E caduc é frequentemente pronunciado mais claramente, o que facilita a compreensão para estrangeiros!" },
  { kw: ["acento","accent","aigu","grave","circonflexe","cedilha","cedille","trema","cedil"], r: "Os acentos em francês mudam a pronúncia e às vezes o significado! Accent aigu (é) → som fechado como 'ê' em 'café'. Accent grave (è, à) → 'è' tem som aberto como 'é' em 'era'; 'à' distingue a preposição 'à' do verbo 'a' (il a). Accent circonflexe (ê, â, î, ô, û) → historicamente indica um 's' perdido: forêt = forest. Cédille (ç) → faz o 'c' soar como 's' antes de a, o, u: français, façade." },

  // --- Francês Québec ---
  { kw: ["québec","quebecois","québécois","canada","montréal","montreal","francês canadense","joual"], r: "Le français québécois est fascinant! Algumas diferenças principais: vocabulário próprio (un char = un voiture, une fin de semaine = un week-end, magasiner = faire du shopping, pogner = attraper/avoir du succès), pronúncia diferente (le 'tu' soa como 'tsu', 'di' soa como 'dzi'), e o uso muito maior de 'on' em vez de 'nous'. O Québec preservou expressões do século XVII que a França abandonou!" },
  { kw: ["joual","gros mots","sacres","tabarnak","caliss","ostie","juramento quebecois"], r: "Os 'sacres' québécois sont un phénomène culturel unique! São palavrões derivados de termos religiosos católicos: tabarnac (tabernaculo), câlice (cálice), ostie (hóstia). Refletem a história de conflito da população com a Igreja Católica. Hoje são usados de forma casual — mais como intensificadores do que blasfêmias. Entender isso é importante para compreender a cultura québécoise, mas use com muito cuidado em contextos formais!" },
  { kw: ["différence","diferença","france vs québec","europeu vs canadense","france canada"], r: "As diferenças mais práticas entre francês europeu e québécois: 1) Vocabulário: fr. européen 'voiture' vs québécois 'char'; 'smartphone' vs 'téléphone intelligent'; 'week-end' vs 'fin de semaine'. 2) Tratamento: na França o vouvoiement é mais preservado; no Québec o tutoiement é quase universal. 3) Pronúncia: o 'ti' e 'di' no Québec soam como 'tsi' e 'dzi'. 4) Expressões: 'c'est le boutte' (incrível), 'avoir le motton' (estar emocionado)." },

  // --- Erros comuns ---
  { kw: ["faux amis","falsos cognatos","falso amigo","libraire","actuellement","sensible","journée"], r: "Les faux amis são armadilhas clássicas! Libraire ≠ 'livraria' (= livreiro/livraria é 'librairie'). Actuellement ≠ 'atualmente' (= na verdade/de fato; 'atualmente' = maintenant/aujourd'hui). Sensible ≠ 'sensível' no sentido emocional errado: significa 'perceptível/sensível' mas o sentido mais emocional é 'sensible' mesmo — ok, esse é parecido. Journée ≠ 'jornada de trabalho' só — significa 'dia inteiro'. Prétendre ≠ 'pretender' (= alegar; 'pretender' = avoir l'intention de)." },
  { kw: ["erro comum","erro de português","brasileiros erram","erro típico","não se diz","incorreto"], r: "Erros típicos de lusófonos em francês: 1) Dizer 'je suis chaud' (estou com calor) → cuidado, pode ter conotação sexual! Use 'j'ai chaud'. 2) Confundir passé composé e imparfait. 3) Esquecer o partitivo: 'je mange le pain' (incorreto no cotidiano) → 'je mange du pain'. 4) Usar 'de' após negação com artigo: 'je n'ai pas d'argent' (não: 'je n'ai pas de l'argent'). 5) Esquecer acordos de participe com être." },
  { kw: ["c'est vs il est","c'est ou il est","é um","é professor","identificação","descrição"], r: "C'est vs Il est é uma distinção sutil! Use 'c'est' + artigo + substantivo: C'est un médecin (É um médico). C'est la Tour Eiffel. Use 'il/elle est' + adjetivo ou profissão SEM artigo: Il est médecin (Ele é médico). Elle est française. Regra prática: se vier artigo (un, une, le, la), use c'est. Se vier adjetivo ou profissão diretamente, use il/elle est. Sauf exceptions, comme: C'est beau! (não: il est beau, nesse contexto)" },

  // --- Expresssões idiomáticas ---
  { kw: ["expressão","idiomática","idiomatica","expressão francesa","locução","coûter les yeux","poser lapin","avoir le cafard"], r: "Quelques expressions idiomatiques! Coûter les yeux de la tête (custar os olhos da cara). Poser un lapin à quelqu'un (dar um bolo em alguém, deixar esperando). Avoir le cafard (estar para baixo/deprimido — barata = cafard). Casser les pieds à quelqu'un (encher o saco de alguém). Avoir du pain sur la planche (ter muito trabalho pela frente). Il ne faut pas vendre la peau de l'ours (não venda o couro do urso antes de matar — semelhante ao equivalente português)." },
  { kw: ["muito bem","parfait","très bien","excellent","bravo","chapeau"], r: "Expressões de aprovação em francês: Très bien ! (Muito bem!), Parfait ! (Perfeito!), Excellent ! (Excelente!), Bravo ! (Parabéns!), Chapeau ! (Chapéu — equivalente a 'hat off', tirando o chapéu), C'est super ! (É ótimo!), Pas mal ! (Nada mal!). No Québec: C'est le boutte ! (É incrível!), Wow, t'es bon(ne) ! (Você é bom/boa nisso!)." },
  { kw: ["desculpe","pardon","excusez","désolé","me desculpe","perdão"], r: "Para pedir desculpas ou licença: Pardon (perdão — suave, ex: passar por alguém), Excusez-moi / Excuse-moi (com licença/me desculpe), Désolé(e) (desculpe — mais intenso, para erros), Je m'excuse (equivalente a 'me desculpe'). No Québec, 'je m'excuse' é extremamente comum para tudo, desde um pedido de licença até um pedido de desculpas sincero. Na França é um pouco mais formal." },

  // --- Textos e compreensão ---
  { kw: ["compreensão","compréhension","ler","reading","texto","leitura","não entendi","não entendo"], r: "Dicas para melhorar a compreensão: 1) Não tente traduzir palavra por palavra — busque o sentido geral primeiro. 2) Identifique as palavras-chave e ignore o que não reconhecer. 3) Use o contexto: se você conhece 70% do texto, consegue deduzir muito do resto. 4) Leia textos autênticos: notícias do Le Monde, Le Devoir (Québec), ou o site TV5Monde. 5) Para áudio: ouça podcasts lentos como 'Journal en français facile' da RFI. Persévérez, ça vient avec le temps!" },

  // --- Conjugação e morfologia ---
  { kw: ["imperativo","impératif","ordem","instrução","faça","vá","venha","fale"], r: "O impératif é usado para ordens, instruções e sugestões. Formado com a 2ª pessoa do singular (sem pronome sujeito) e as formas de nous e vous: Parle ! (Fala! — informal), Parlez ! (Fale! — formal/plural), Parlons ! (Vamos falar!). Os verbos -er perdem o 's' no tu: Mange ! (não: Manges!). Irregulares: Sois (sé), Aie (tenha), Sache (saiba), Va ! (Vai!). Avec pronoms: Dis-le moi ! (me diz), Ne le fais pas ! (não faça isso)." },
  { kw: ["accord participe","acordo do particípio","participio acordo","accord participe passé","genero participio"], r: "O acordo do participe passé tem regras específicas! Com avoir: o participe concorda com o objeto direto SE ele vier ANTES do verbo: Les fleurs que j'ai achetées (compradas — 'les fleurs' é COD antes). Mas: J'ai acheté des fleurs (sem acordo — COD depois). Com être: sempre concorda com o sujeito: Elle est partie. Ils sont arrivés. Avec les verbes pronominaux: Elle s'est lavée (mas: elle s'est lavé les mains — mains é COD, não ela mesma)." },

  // --- Recursos ---
  { kw: ["seriado","série","filme","netflix","assistir","tv5","rfi","podcast","música","musica","aprender com"], r: "Minhas recomendações culturais para aprender francês! Séries: Lupin, Le Bureau des Légendes, Engrenages (France), Les Soeurs Elliot, Trop (Québec). Filmes: Amélie Poulain, Intouchables, Les Choristes. Músicas: Stromae, Angèle, Zaz, Édith Piaf, Cœur de pirate (Québec). Podcasts: Journal en français facile (RFI), innerFrench, Français Authentique. Sites: TV5Monde, Le Point du FLE, Duolingo para prática rápida. L'exposition au français authentique est indispensable!" },

  // --- Fallback ---
  { kw: ["__fallback__"], r: "Hmm, não tenho uma resposta pronta para isso ainda! 🤔 Mas posso te ajudar com gramática (artigos, verbos, tempos verbais, pronomes), vocabulário (família, comida, viagem, trabalho), pronúncia (nasais, R, liaison), o francês do Québec, expressões idiomáticas, ou dicas de estudo. Pode reformular sua pergunta? Vou fazer o meu melhor, comme toujours!" }
];

const chatMatch = (query) => {
  const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const q = norm(query);
  const qWords = q.split(/\W+/).filter(w => w.length > 0);
  let best = null, bestScore = 0;
  for (const entry of CHAT_KB) {
    if (entry.kw[0] === "__fallback__") continue;
    const score = entry.kw.reduce((acc, kw) => {
      const k = norm(kw);
      if (k.length < 3) return acc; // ignore single chars/digraphs — too ambiguous
      // Short keywords (3–4 chars): must match a whole word to avoid false positives
      if (k.length <= 4) {
        return acc + (qWords.some(w => w === k || w.startsWith(k + "s")) ? 2 : 0);
      }
      // Long keywords: substring match is fine, score by length
      return acc + (q.includes(k) ? (k.length > 7 ? 4 : 3) : 0);
    }, 0);
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  return bestScore > 0 ? best.r : CHAT_KB[CHAT_KB.length - 1].r;
};
